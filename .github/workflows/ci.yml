name: dotnet build
on:
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code 
              uses: actions/checkout@v6
            - name: setup dotnet              # dotnet install
              uses: actions/setup-dotnet@v6
              with:
                dotnet-version: '10.0.x'
            - name: restore dependencies
              run: |
                # cd UrbanCompanySaloon
                dotnet restore
            - name: build
              run: |
                # cd UrbanCompanySaloon
                dotnet build --no-restore
        